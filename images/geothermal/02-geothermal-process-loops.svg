<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace">
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#111"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="900" fill="#ffffff"/>

  <text x="60" y="66" font-size="26" font-weight="600" fill="#111" letter-spacing="1">GEOTHERMAL COOLING — PROCESS LOOPS</text>
  <text x="60" y="94" font-size="15" fill="#555" letter-spacing="1">TWO CLOSED CIRCUITS COUPLED THROUGH ONE PLATE HEAT EXCHANGER</text>
  <line x1="60" y1="112" x2="1140" y2="112" stroke="#111" stroke-width="1.5"/>

  <!-- ================= HEAT EXCHANGER (center) ================= -->
  <rect x="520" y="330" width="160" height="240" fill="none" stroke="#111" stroke-width="3"/>
  <text x="600" y="316" font-size="16" font-weight="600" fill="#111" text-anchor="middle">HEAT EXCHANGER</text>
  <g stroke="#111" stroke-width="2" fill="none">
    <path d="M540,360 L660,360 L540,390 L660,390 L540,420 L660,420 L540,450 L660,450 L540,480 L660,480 L540,510 L660,510 L540,540 L660,540"/>
  </g>
  <!-- heat transfer arrow across -->
  <text x="600" y="620" font-size="13" fill="#555" text-anchor="middle">heat rejected  →  ground</text>

  <!-- ================= DATA-CENTRE LOOP (left) ================= -->
  <rect x="120" y="380" width="240" height="150" fill="none" stroke="#111" stroke-width="2.5"/>
  <text x="240" y="440" font-size="17" font-weight="600" fill="#111" text-anchor="middle">SERVER LOAD</text>
  <text x="240" y="466" font-size="13" fill="#333" text-anchor="middle">+ CRAH / CDU</text>
  <text x="240" y="352" font-size="13" fill="#555" text-anchor="middle">DATA-CENTRE COOLANT LOOP</text>

  <!-- warm return -> HX -->
  <path d="M360,415 L520,415" fill="none" stroke="#111" stroke-width="4" marker-end="url(#a2)"/>
  <text x="440" y="404" font-size="13" fill="#111" text-anchor="middle">≈30 °C</text>
  <!-- cool supply <- HX -->
  <path d="M520,495 L360,495" fill="none" stroke="#111" stroke-width="4" marker-end="url(#a2)"/>
  <text x="440" y="517" font-size="13" fill="#111" text-anchor="middle">≈18 °C</text>
  <circle cx="440" cy="495" r="15" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="440" y="500" font-size="14" fill="#111" text-anchor="middle">P</text>

  <!-- ================= GEOTHERMAL LOOP (right + down) ================= -->
  <text x="960" y="352" font-size="13" fill="#555" text-anchor="middle">GEOTHERMAL WATER LOOP</text>
  <!-- warm out of HX -> right -> down to reservoir -->
  <path d="M680,415 L1020,415 L1020,620" fill="none" stroke="#111" stroke-width="4" stroke-dasharray="10 7" marker-end="url(#a2)"/>
  <text x="1035" y="520" font-size="13" fill="#111">≈22 °C</text>
  <!-- cold from reservoir -> up -> into HX -->
  <path d="M900,620 L900,495 L680,495" fill="none" stroke="#111" stroke-width="4" stroke-dasharray="10 7" marker-end="url(#a2)"/>
  <text x="820" y="484" font-size="13" fill="#111" text-anchor="middle">≈12 °C</text>
  <circle cx="900" cy="560" r="15" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="900" y="565" font-size="14" fill="#111" text-anchor="middle">P</text>

  <!-- reservoir box -->
  <rect x="800" y="620" width="320" height="150" rx="10" fill="none" stroke="#111" stroke-width="2.5"/>
  <g stroke="#111" stroke-width="1.4" opacity="0.55" fill="none">
    <path d="M812,700 q20,-18 40,0 q20,18 40,0 q20,-18 40,0 q20,18 40,0 q20,-18 40,0 q20,18 40,0 q20,-18 40,0"/>
    <path d="M812,730 q20,-18 40,0 q20,18 40,0 q20,-18 40,0 q20,18 40,0 q20,-18 40,0 q20,18 40,0 q20,-18 40,0"/>
  </g>
  <text x="960" y="662" font-size="16" font-weight="600" fill="#111" text-anchor="middle">WATER RESERVOIR</text>
  <text x="960" y="684" font-size="12" fill="#333" text-anchor="middle">ground-water heat sink · ≈10–15 °C</text>

  <!-- footer note -->
  <text x="60" y="830" font-size="13" fill="#555">Servers reject heat to the coolant loop → transferred across the heat exchanger → carried by ground water to the reservoir.</text>
  <text x="60" y="852" font-size="13" fill="#555">Result: grid-independent cooling, ~40% lower energy vs. conventional CRAC.</text>
</svg>
