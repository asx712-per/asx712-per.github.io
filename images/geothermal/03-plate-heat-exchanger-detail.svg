<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace">
  <defs>
    <marker id="a3" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#111"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="900" fill="#ffffff"/>

  <text x="60" y="66" font-size="26" font-weight="600" fill="#111" letter-spacing="1">PLATE HEAT EXCHANGER — COUNTERFLOW</text>
  <text x="60" y="94" font-size="15" fill="#555" letter-spacing="1">DATA-CENTRE COOLANT (SOLID)  vs.  GROUND WATER (DASHED)</text>
  <line x1="60" y1="112" x2="1140" y2="112" stroke="#111" stroke-width="1.5"/>

  <!-- frame -->
  <rect x="360" y="230" width="480" height="420" fill="none" stroke="#111" stroke-width="3"/>
  <!-- end plates -->
  <rect x="360" y="230" width="26" height="420" fill="#f2f2f2" stroke="#111" stroke-width="2"/>
  <rect x="814" y="230" width="26" height="420" fill="#f2f2f2" stroke="#111" stroke-width="2"/>
  <!-- tie bar -->
  <line x1="340" y1="440" x2="860" y2="440" stroke="#111" stroke-width="1" opacity="0.25"/>

  <!-- corrugated plates -->
  <g stroke="#111" stroke-width="2" fill="none" opacity="0.9">
    <path d="M420,250 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20"/>
    <path d="M470,250 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20"/>
    <path d="M520,250 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20"/>
    <path d="M570,250 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20"/>
    <path d="M620,250 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20"/>
    <path d="M670,250 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20"/>
    <path d="M720,250 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20"/>
    <path d="M770,250 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20 l-16,20 l16,20"/>
  </g>

  <!-- internal flow direction indicators: hot down, cold up -->
  <path d="M445,300 L445,560" stroke="#111" stroke-width="3" marker-end="url(#a3)"/>
  <path d="M545,300 L545,560" stroke="#111" stroke-width="3" marker-end="url(#a3)"/>
  <path d="M645,560 L645,300" stroke="#111" stroke-width="3" stroke-dasharray="9 6" marker-end="url(#a3)"/>
  <path d="M745,560 L745,300" stroke="#111" stroke-width="3" stroke-dasharray="9 6" marker-end="url(#a3)"/>

  <!-- ============ NOZZLES / PORTS ============ -->
  <!-- HOT IN (top-left) -->
  <path d="M230,270 L360,270" stroke="#111" stroke-width="6" marker-end="url(#a3)"/>
  <text x="226" y="252" font-size="15" font-weight="600" fill="#111" text-anchor="end">HOT IN</text>
  <text x="226" y="276" font-size="14" fill="#111" text-anchor="end">≈30 °C</text>
  <!-- HOT OUT (bottom-left) -->
  <path d="M360,610 L230,610" stroke="#111" stroke-width="6" marker-end="url(#a3)"/>
  <text x="226" y="592" font-size="15" font-weight="600" fill="#111" text-anchor="end">COOLED OUT</text>
  <text x="226" y="632" font-size="14" fill="#111" text-anchor="end">≈18 °C</text>

  <!-- COLD IN (bottom-right) -->
  <path d="M970,610 L840,610" stroke="#111" stroke-width="6" stroke-dasharray="9 6" marker-end="url(#a3)"/>
  <text x="974" y="592" font-size="15" font-weight="600" fill="#111">GROUND WATER IN</text>
  <text x="974" y="632" font-size="14" fill="#111">≈12 °C</text>
  <!-- COLD OUT (top-right) -->
  <path d="M840,270 L970,270" stroke="#111" stroke-width="6" stroke-dasharray="9 6" marker-end="url(#a3)"/>
  <text x="974" y="252" font-size="15" font-weight="600" fill="#111">WARMED OUT</text>
  <text x="974" y="276" font-size="14" fill="#111">≈22 °C</text>

  <!-- legend -->
  <line x1="360" y1="700" x2="410" y2="700" stroke="#111" stroke-width="4"/>
  <text x="420" y="705" font-size="14" fill="#111">Data-centre coolant (rejects heat)</text>
  <line x1="360" y1="728" x2="410" y2="728" stroke="#111" stroke-width="4" stroke-dasharray="10 7"/>
  <text x="420" y="733" font-size="14" fill="#111">Ground water (absorbs heat)</text>

  <text x="60" y="852" font-size="13" fill="#555">Counterflow arrangement maximises temperature exchange; the two fluids never mix — only heat crosses the plates.</text>
</svg>
